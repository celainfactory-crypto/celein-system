  <noscript>
    <div style="padding:40px;text-align:center;font-family:Cairo,sans-serif">

  <script>
    // ضمان ظهور المحتوى بعد تحميل كل الملفات
    window.addEventListener("load", () => {
      document.body.classList.add("ready");
    });

    // PWA: Register Service Worker + force update check
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw-proxy.js?v=20.3')
          .then(reg => {
            console.log('✓ PWA Service Worker v11 registered');
            // Force update check every 60 seconds
            setInterval(() => reg.update(), 60000);
          })
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
